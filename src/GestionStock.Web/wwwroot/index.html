<!DOCTYPE html>
<html lang="fr" data-theme="standard">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestionStock</title>
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#16161a;flex-direction:column;gap:20px;">
            <div style="width:40px;height:40px;background:#f5a623;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#000;font-family:sans-serif;">GS</div>
            <p style="color:#888;font-family:sans-serif;font-size:13px;">Chargement de GestionStock…</p>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#a32d2d;color:#fff;padding:12px 20px;font-size:13px;font-family:sans-serif;z-index:9999;">
        Une erreur inattendue est survenue.
        <a href="" style="color:#fac775;margin-left:12px;text-decoration:underline;">Recharger la page</a>
    </div>

    <script>
        window.applyGestionStockTheme = function (theme) {
            var normalized = (theme || "standard").toLowerCase();
            document.documentElement.setAttribute("data-theme", normalized);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
